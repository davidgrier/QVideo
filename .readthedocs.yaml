version: 2

build:
  os: ubuntu-22.04
  tools:
    python: '3.12'
  apt_packages:
    - libgl1
    - libegl1
    - libglib2.0-0
    - libxkbcommon0

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false
